<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randomizer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    body.size-small {
      --number-size: 80px;
      --number-font: 40px;
      --name-font: 20px;
      --name-padding: 12px;
    }

    body.size-medium {
      --number-size: 120px;
      --number-font: 64px;
      --name-font: 28px;
      --name-padding: 18px;
    }

    body.size-large {
      --number-size: 150px;
      --number-font: 80px;
      --name-font: 36px;
      --name-padding: 22px;
    }

    body.size-xlarge {
      --number-size: 190px;
      --number-font: 100px;
      --name-font: 44px;
      --name-padding: 28px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 430px;
      max-width: 100%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
      color: #2b5cff;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      text-align: center;
      box-sizing: border-box;
    }

    textarea {
      height: 150px;
      text-align: left;
      resize: vertical;
      font-family: Arial, sans-serif;
    }

    .option-group {
      width: 90%;
      margin: 12px auto;
      background: #f5f8ff;
      padding: 12px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    .option-title {
      font-weight: bold;
      color: #1746d6;
      margin-bottom: 8px;
      text-align: left;
    }

    .type-row {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .type-item {
      flex: 1;
      background: white;
      border: 1px solid #d6e0ff;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      color: #1746d6;
    }

    .type-item input {
      width: auto;
      margin-right: 6px;
      transform: scale(1.2);
    }

    .input-row {
      width: 90%;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    .input-row input {
      width: 50%;
    }

    .field-group {
      width: 90%;
      margin: 8px auto;
      text-align: left;
    }

    .field-group label {
      font-weight: bold;
      color: #333;
      font-size: 15px;
    }

    .field-group input {
      width: 100%;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      font-size: 16px;
      cursor: pointer;
      color: #333;
    }

    .checkbox-item input {
      width: auto;
      transform: scale(1.2);
    }

    .size-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .size-item {
      background: white;
      border: 1px solid #d6e0ff;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      color: #1746d6;
    }

    .size-item input {
      width: auto;
      margin-right: 5px;
      transform: scale(1.1);
    }

    .setting-details {
      width: 90%;
      margin: 12px auto;
      text-align: left;
    }

    .setting-details summary {
      background: #f5f8ff;
      color: #1746d6;
      font-weight: bold;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      list-style: none;
    }

    .setting-details summary::-webkit-details-marker {
      display: none;
    }

    button {
      margin-top: 12px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #2b5cff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1746d6;
    }

    .reset-btn {
      background: #ff4d6d;
      margin-left: 5px;
    }

    .reset-btn:hover {
      background: #d93655;
    }

    #result {
      margin-top: 25px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .color-1 {
      --card-bg: #ff4d6d;
      --soft-bg: #ffe6ec;
    }

    .color-2 {
      --card-bg: #2b5cff;
      --soft-bg: #e7edff;
    }

    .color-3 {
      --card-bg: #00b894;
      --soft-bg: #e1fff8;
    }

    .color-4 {
      --card-bg: #fd9644;
      --soft-bg: #fff0e4;
    }

    .color-5 {
      --card-bg: #8854d0;
      --soft-bg: #f0e8ff;
    }

    .color-6 {
      --card-bg: #20bf6b;
      --soft-bg: #e5fff0;
    }

    .color-7 {
      --card-bg: #eb3b5a;
      --soft-bg: #ffe6eb;
    }

    .color-8 {
      --card-bg: #0fb9b1;
      --soft-bg: #e2fffd;
    }

    .number-card {
      width: var(--number-size);
      height: var(--number-size);
      background: var(--card-bg);
      color: white;
      border-radius: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: var(--number-font);
      font-weight: bold;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
      animation: pop 0.25s ease;
    }

    .rolling-card {
      animation: rolling 0.12s infinite alternate;
      filter: brightness(1.08);
    }

    .name-list {
      width: 90%;
      text-align: left;
      margin: 20px auto 0;
      padding: 0;
      list-style-position: inside;
    }

    .name-list li {
      background: var(--soft-bg);
      border-left: 8px solid var(--card-bg);
      margin: 10px 0;
      padding: var(--name-padding);
      border-radius: 16px;
      font-size: var(--name-font);
      font-weight: bold;
      color: #222;
      animation: pop 0.25s ease;
    }

    .name-list li.rolling-name {
      animation: rolling 0.12s infinite alternate;
    }

    .history-section {
      width: 90%;
      margin: 25px auto 0;
      background: #f5f8ff;
      padding: 12px;
      border-radius: 12px;
      box-sizing: border-box;
      text-align: left;
    }

    .history-title {
      font-weight: bold;
      color: #1746d6;
      margin-bottom: 10px;
      text-align: center;
    }

    .history-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .history-actions button {
      margin-top: 0;
      padding: 8px 12px;
      font-size: 14px;
    }

    .history-item {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #d6e0ff;
    }

    .history-time {
      font-size: 13px;
      color: #666;
      margin-top: 3px;
    }

    .history-result {
      margin-top: 6px;
      font-weight: bold;
      color: #ff4d6d;
      font-size: 18px;
      word-break: break-word;
    }

    .empty-history {
      text-align: center;
      color: #777;
      font-size: 14px;
    }

    @keyframes pop {
      0% {
        transform: scale(0.7);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes rolling {
      0% {
        transform: rotate(-2deg) scale(0.96);
      }

      100% {
        transform: rotate(2deg) scale(1.04);
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body class="size-medium">

  <div class="box">
    <h1>Randomizer</h1>

    <details class="setting-details">
      <summary>ตั้งค่าเพิ่มเติม</summary>

      <div class="option-group">
        <div class="option-title">เลือกประเภทการสุ่ม</div>

        <div class="type-row">
          <label class="type-item">
            <input type="radio" name="randomType" value="number" checked onchange="changeRandomType()">
            เลขที่
          </label>

          <label class="type-item">
            <input type="radio" name="randomType" value="name" onchange="changeRandomType()">
            ชื่อ
          </label>
        </div>
      </div>

      <div class="option-group">
        <div class="option-title">ขนาดผลสุ่ม</div>

        <div class="size-row">
          <label class="size-item">
            <input type="radio" name="resultSize" value="small" onchange="changeResultSize()">
            เล็ก
          </label>

          <label class="size-item">
            <input type="radio" name="resultSize" value="medium" checked onchange="changeResultSize()">
            กลาง
          </label>

          <label class="size-item">
            <input type="radio" name="resultSize" value="large" onchange="changeResultSize()">
            ใหญ่
          </label>

          <label class="size-item">
            <input type="radio" name="resultSize" value="xlarge" onchange="changeResultSize()">
            ใหญ่มาก
          </label>
        </div>
      </div>

      <div class="option-group">
        <label class="checkbox-item">
          <input type="checkbox" id="soundOn" checked>
          เปิดเสียง
        </label>
      </div>
    </details>

    <div id="numberSection">
      <div class="input-row">
        <input type="number" id="min" placeholder="แรกสุด">
        <input type="number" id="max" placeholder="ท้ายสุด">
      </div>

      <div class="field-group">
        <label for="count">จำนวนการสุ่ม</label>
        <input type="number" id="count">
      </div>

      <div class="option-group">
        <label class="checkbox-item">
          <input type="checkbox" id="noRepeatNumber">
          ไม่ซ้ำ
        </label>
      </div>
    </div>

    <div id="nameSection" class="hidden">
      <textarea id="nameInput" placeholder="กรอกรายชื่อ บรรทัดละ 1 คน เช่น
เด็กหญิงอารี
เด็กชายภูผา
เด็กหญิงมะลิ"></textarea>

      <div class="field-group">
        <label for="nameCount">จำนวนการสุ่ม</label>
        <input type="number" id="nameCount">
      </div>

      <div class="option-group">
        <label class="checkbox-item">
          <input type="checkbox" id="noRepeatName">
          ไม่ซ้ำ
        </label>
      </div>
    </div>

    <button onclick="randomStart()">สุ่ม</button>
    <button class="reset-btn" onclick="resetAll()">รีเซ็ต</button>

    <div id="result"></div>

    <div class="history-section">
      <div class="history-title">ประวัติผลการสุ่ม</div>

      <div class="history-actions">
        <button onclick="copyHistory()">คัดลอก</button>
        <button class="reset-btn" onclick="clearHistory()">ล้างประวัติ</button>
      </div>

      <div id="historyList">
        <div class="empty-history">ยังไม่มีประวัติการสุ่ม</div>
      </div>
    </div>
  </div>

  <script>
    let usedNumbers = [];
    let currentRange = "";

    let usedNames = [];
    let currentNameList = "";

    let randomHistory = [];

    try {
      randomHistory = JSON.parse(localStorage.getItem("randomHistory")) || [];
    } catch (error) {
      randomHistory = [];
    }

    const colorClasses = [
      "color-1",
      "color-2",
      "color-3",
      "color-4",
      "color-5",
      "color-6",
      "color-7",
      "color-8"
    ];

    function getSelectedValue(name) {
      return document.querySelector('input[name="' + name + '"]:checked').value;
    }

    function shuffleArray(array) {
      let newArray = [...array];

      for (let i = newArray.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        let temp = newArray[i];
        newArray[i] = newArray[j];
        newArray[j] = temp;
      }

      return newArray;
    }

    function getColorClass(index, colorOrder) {
      return colorOrder[index % colorOrder.length];
    }

    function setColorClass(element, colorClass) {
      colorClasses.forEach(function(className) {
        element.classList.remove(className);
      });

      element.classList.add(colorClass);
    }

    function changeResultSize() {
      let size = getSelectedValue("resultSize");

      document.body.classList.remove(
        "size-small",
        "size-medium",
        "size-large",
        "size-xlarge"
      );

      document.body.classList.add("size-" + size);
    }

    function playRandomSound() {
      let soundOn = document.getElementById("soundOn").checked;

      if (!soundOn) {
        return;
      }

      let AudioContext = window.AudioContext || window.webkitAudioContext;
      let audioCtx = new AudioContext();

      let notes = [523, 659, 784, 1046];

      notes.forEach(function(freq, index) {
        setTimeout(function() {
          let oscillator = audioCtx.createOscillator();
          let gainNode = audioCtx.createGain();

          oscillator.type = "sine";
          oscillator.frequency.value = freq;

          gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.15);
        }, index * 80);
      });

      setTimeout(function() {
        audioCtx.close();
      }, 700);
    }

    function changeRandomType() {
      let randomType = getSelectedValue("randomType");

      document.getElementById("result").innerHTML = "";

      if (randomType === "number") {
        document.getElementById("numberSection").classList.remove("hidden");
        document.getElementById("nameSection").classList.add("hidden");
      } else {
        document.getElementById("numberSection").classList.add("hidden");
        document.getElementById("nameSection").classList.remove("hidden");
      }
    }

    async function randomStart() {
      let randomType = getSelectedValue("randomType");

      if (randomType === "number") {
        await randomNumbers();
      } else {
        await randomNames();
      }
    }

    async function randomNumbers() {
      let min = parseInt(document.getElementById("min").value);
      let max = parseInt(document.getElementById("max").value);
      let count = parseInt(document.getElementById("count").value);
      let noRepeat = document.getElementById("noRepeatNumber").checked;

      let resultBox = document.getElementById("result");
      resultBox.innerHTML = "";

      if (isNaN(min) || isNaN(max)) {
        alert("กรุณากรอกเลขแรกสุดและเลขท้ายสุด");
        return;
      }

      if (isNaN(count) || count <= 0) {
        count = 1;
      }

      if (min > max) {
        alert("เลขแรกสุดต้องน้อยกว่าเลขท้ายสุด");
        return;
      }

      let totalNumbers = max - min + 1;
      let newRange = min + "-" + max;

      if (currentRange !== newRange) {
        usedNumbers = [];
        currentRange = newRange;
      }

      let randomResult = [];

      if (noRepeat) {
        let availableNumbers = [];

        for (let i = min; i <= max; i++) {
          if (!usedNumbers.includes(i)) {
            availableNumbers.push(i);
          }
        }

        if (availableNumbers.length === 0) {
          alert("เลขถูกสุ่มครบหมดแล้ว กรุณากดรีเซ็ตเพื่อเริ่มใหม่");
          return;
        }

        if (count > availableNumbers.length) {
          alert("เลขที่เหลือไม่พอ เหลือเพียง " + availableNumbers.length + " เลข");
          return;
        }

        for (let i = 0; i < count; i++) {
          let randomIndex = Math.floor(Math.random() * availableNumbers.length);
          let randomNumber = availableNumbers[randomIndex];

          randomResult.push(randomNumber);
          usedNumbers.push(randomNumber);
          availableNumbers.splice(randomIndex, 1);
        }
      } else {
        for (let i = 0; i < count; i++) {
          let randomNumber = Math.floor(Math.random() * totalNumbers) + min;
          randomResult.push(randomNumber);
        }
      }

      playRandomSound();
      await showRollingNumbers(count, min, max);
      showNumberResult(randomResult);
      saveRandomHistory("เลขที่", randomResult);
    }

    async function randomNames() {
      let nameText = document.getElementById("nameInput").value;
      let count = parseInt(document.getElementById("nameCount").value);
      let noRepeat = document.getElementById("noRepeatName").checked;

      let resultBox = document.getElementById("result");
      resultBox.innerHTML = "";

      let names = nameText
        .split("\n")
        .map(name => name.trim())
        .filter(name => name !== "");

      names = [...new Set(names)];

      if (names.length === 0) {
        alert("กรุณากรอกรายชื่อก่อนสุ่ม");
        return;
      }

      if (isNaN(count) || count <= 0) {
        count = 1;
      }

      let newNameList = names.join("|");

      if (currentNameList !== newNameList) {
        usedNames = [];
        currentNameList = newNameList;
      }

      let randomResult = [];

      if (noRepeat) {
        let availableNames = names.filter(name => !usedNames.includes(name));

        if (availableNames.length === 0) {
          alert("รายชื่อถูกสุ่มครบหมดแล้ว กรุณากดรีเซ็ตเพื่อเริ่มใหม่");
          return;
        }

        if (count > availableNames.length) {
          alert("รายชื่อที่เหลือไม่พอ เหลือเพียง " + availableNames.length + " คน");
          return;
        }

        for (let i = 0; i < count; i++) {
          let randomIndex = Math.floor(Math.random() * availableNames.length);
          let randomName = availableNames[randomIndex];

          randomResult.push(randomName);
          usedNames.push(randomName);
          availableNames.splice(randomIndex, 1);
        }
      } else {
        for (let i = 0; i < count; i++) {
          let randomIndex = Math.floor(Math.random() * names.length);
          randomResult.push(names[randomIndex]);
        }
      }

      playRandomSound();
      await showRollingNames(count, names);
      showNameResult(randomResult);
      saveRandomHistory("ชื่อ", randomResult);
    }

    function showRollingNumbers(count, min, max) {
      return new Promise(function(resolve) {
        let resultBox = document.getElementById("result");
        resultBox.innerHTML = "";

        let colorOrder = shuffleArray(colorClasses);
        let cards = [];

        for (let i = 0; i < count; i++) {
          let card = document.createElement("div");
          card.className = "number-card rolling-card " + getColorClass(i, colorOrder);
          card.innerText = Math.floor(Math.random() * (max - min + 1)) + min;
          resultBox.appendChild(card);
          cards.push(card);
        }

        let interval = setInterval(function() {
          cards.forEach(function(card, index) {
            let randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
            let randomColor = colorClasses[Math.floor(Math.random() * colorClasses.length)];

            card.innerText = randomNumber;
            setColorClass(card, randomColor);
          });
        }, 70);

        setTimeout(function() {
          clearInterval(interval);
          resolve();
        }, 1200);
      });
    }

    function showRollingNames(count, names) {
      return new Promise(function(resolve) {
        let resultBox = document.getElementById("result");
        resultBox.innerHTML = "";

        let colorOrder = shuffleArray(colorClasses);
        let list = document.createElement("ol");
        list.className = "name-list";

        let items = [];

        for (let i = 0; i < count; i++) {
          let item = document.createElement("li");
          item.className = "rolling-name " + getColorClass(i, colorOrder);
          item.innerText = names[Math.floor(Math.random() * names.length)];
          list.appendChild(item);
          items.push(item);
        }

        resultBox.appendChild(list);

        let interval = setInterval(function() {
          items.forEach(function(item) {
            let randomName = names[Math.floor(Math.random() * names.length)];
            let randomColor = colorClasses[Math.floor(Math.random() * colorClasses.length)];

            item.innerText = randomName;
            setColorClass(item, randomColor);
          });
        }, 70);

        setTimeout(function() {
          clearInterval(interval);
          resolve();
        }, 1200);
      });
    }

    function showNumberResult(numbers) {
      let resultBox = document.getElementById("result");
      resultBox.innerHTML = "";

      let colorOrder = shuffleArray(colorClasses);

      numbers.forEach(function(number, index) {
        let card = document.createElement("div");
        card.className = "number-card " + getColorClass(index, colorOrder);
        card.innerText = number;
        resultBox.appendChild(card);
      });
    }

    function showNameResult(names) {
      let resultBox = document.getElementById("result");
      resultBox.innerHTML = "";

      let colorOrder = shuffleArray(colorClasses);

      let list = document.createElement("ol");
      list.className = "name-list";

      names.forEach(function(name, index) {
        let item = document.createElement("li");
        item.className = getColorClass(index, colorOrder);
        item.innerText = name;
        list.appendChild(item);
      });

      resultBox.appendChild(list);
    }

    function saveRandomHistory(type, results) {
      let time = new Date().toLocaleString("th-TH");

      randomHistory.unshift({
        type: type,
        results: results,
        time: time
      });

      localStorage.setItem("randomHistory", JSON.stringify(randomHistory));
      renderRandomHistory();
    }

    function renderRandomHistory() {
      let historyList = document.getElementById("historyList");

      if (!historyList) {
        return;
      }

      historyList.innerHTML = "";

      if (randomHistory.length === 0) {
        let empty = document.createElement("div");
        empty.className = "empty-history";
        empty.innerText = "ยังไม่มีประวัติการสุ่ม";
        historyList.appendChild(empty);
        return;
      }

      randomHistory.forEach(function(item, index) {
        let historyItem = document.createElement("div");
        historyItem.className = "history-item";

        let title = document.createElement("div");
        title.innerText = (index + 1) + ". " + item.type;

        let time = document.createElement("div");
        time.className = "history-time";
        time.innerText = item.time;

        let result = document.createElement("div");
        result.className = "history-result";
        result.innerText = item.results.join(", ");

        historyItem.appendChild(title);
        historyItem.appendChild(time);
        historyItem.appendChild(result);

        historyList.appendChild(historyItem);
      });
    }

    function clearHistory() {
      let confirmClear = confirm("ต้องการล้างประวัติผลการสุ่มทั้งหมดหรือไม่?");

      if (!confirmClear) {
        return;
      }

      randomHistory = [];
      localStorage.removeItem("randomHistory");
      renderRandomHistory();
    }

    function copyHistory() {
      if (randomHistory.length === 0) {
        alert("ยังไม่มีประวัติให้คัดลอก");
        return;
      }

      let text = randomHistory.map(function(item, index) {
        return (index + 1) + ". " + item.type + " | " + item.time + " | " + item.results.join(", ");
      }).join("\n");

      navigator.clipboard.writeText(text)
        .then(function() {
          alert("คัดลอกประวัติแล้ว");
        })
        .catch(function() {
          alert("คัดลอกไม่สำเร็จ");
        });
    }

    function resetAll() {
      usedNumbers = [];
      currentRange = "";

      usedNames = [];
      currentNameList = "";

      document.getElementById("result").innerHTML = "";
    }

    window.addEventListener("load", renderRandomHistory);
  </script>

</body>
</html>
