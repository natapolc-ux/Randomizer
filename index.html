<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เว็บสุ่มเลขที่และชื่อ</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 430px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
      color: #2b5cff;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      text-align: center;
      box-sizing: border-box;
    }

    textarea {
      height: 150px;
      text-align: left;
      resize: vertical;
      font-family: Arial, sans-serif;
    }

    .option-group {
      width: 90%;
      margin: 12px auto;
      background: #f5f8ff;
      padding: 12px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    .option-title {
      font-weight: bold;
      color: #1746d6;
      margin-bottom: 8px;
      text-align: left;
    }

    .type-row {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .type-item {
      flex: 1;
      background: white;
      border: 1px solid #d6e0ff;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      color: #1746d6;
    }

    .type-item input {
      width: auto;
      margin-right: 6px;
      transform: scale(1.2);
    }

    .input-row {
      width: 90%;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    .input-row input {
      width: 50%;
    }

    .field-group {
      width: 90%;
      margin: 8px auto;
      text-align: left;
    }

    .field-group label {
      font-weight: bold;
      color: #333;
      font-size: 15px;
    }

    .field-group input {
      width: 100%;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      font-size: 16px;
      cursor: pointer;
      color: #333;
    }

    .checkbox-item input {
      width: auto;
      transform: scale(1.2);
    }

    button {
      margin-top: 12px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #2b5cff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1746d6;
    }

    .reset-btn {
      background: #ff4d6d;
      margin-left: 5px;
    }

    .reset-btn:hover {
      background: #d93655;
    }

    #result {
      margin-top: 25px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .number-card {
      width: 70px;
      height: 70px;
      background: #ff4d6d;
      color: white;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .name-list {
      width: 90%;
      text-align: left;
      margin: 20px auto 0;
      padding: 0;
      list-style-position: inside;
    }

    .name-list li {
      background: #f1f5ff;
      margin: 8px 0;
      padding: 12px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #1746d6;
    }

    #status {
      margin-top: 15px;
      font-size: 15px;
      color: #333;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>เว็บสุ่ม</h1>

    <!-- เลือกประเภทการสุ่ม -->
    <div class="option-group">
      <div class="option-title">เลือกประเภทการสุ่ม</div>

      <div class="type-row">
        <label class="type-item">
          <input type="radio" name="randomType" value="number" checked onchange="changeRandomType()">
          เลขที่
        </label>

        <label class="type-item">
          <input type="radio" name="randomType" value="name" onchange="changeRandomType()">
          ชื่อ
        </label>
      </div>
    </div>

    <!-- ส่วนสุ่มเลขที่ -->
    <div id="numberSection">
      <div class="input-row">
        <input type="number" id="min" placeholder="เลขต่ำสุด">
        <input type="number" id="max" placeholder="เลขสูงสุด">
      </div>

      <div class="field-group">
        <label for="count">จำนวนการสุ่ม</label>
        <input type="number" id="count" placeholder="เช่น 5">
      </div>

      <div class="option-group">
        <label class="checkbox-item">
          <input type="checkbox" id="noRepeatNumber">
          ไม่ซ้ำ
        </label>
      </div>
    </div>

    <!-- ส่วนสุ่มชื่อ -->
    <div id="nameSection" class="hidden">
      <textarea id="nameInput" placeholder="กรอกรายชื่อ บรรทัดละ 1 คน เช่น
เด็กหญิงอารี
เด็กชายภูผา
เด็กหญิงมะลิ"></textarea>

      <div class="field-group">
        <label for="nameCount">จำนวนการสุ่ม</label>
        <input type="number" id="nameCount" placeholder="เช่น 5">
      </div>

      <div class="option-group">
        <label class="checkbox-item">
          <input type="checkbox" id="noRepeatName">
          ไม่ซ้ำ
        </label>
      </div>
    </div>

    <br>

    <button onclick="randomStart()">สุ่ม</button>
    <button class="reset-btn" onclick="resetAll()">รีเซ็ต</button>

    <div id="result"></div>
    <div id="status">ยังไม่ได้สุ่ม</div>
  </div>

  <script>
    let usedNumbers = [];
    let currentRange = "";

    let usedNames = [];
    let currentNameList = "";

    function getSelectedValue(name) {
      return document.querySelector('input[name="' + name + '"]:checked').value;
    }

    function changeRandomType() {
      let randomType = getSelectedValue("randomType");

      document.getElementById("result").innerHTML = "";
      document.getElementById("status").innerHTML = "ยังไม่ได้สุ่ม";

      if (randomType === "number") {
        document.getElementById("numberSection").classList.remove("hidden");
        document.getElementById("nameSection").classList.add("hidden");
      } else {
        document.getElementById("numberSection").classList.add("hidden");
        document.getElementById("nameSection").classList.remove("hidden");
      }
    }

    function randomStart() {
      let randomType = getSelectedValue("randomType");

      if (randomType === "number") {
        randomNumbers();
      } else {
        randomNames();
      }
    }

    function randomNumbers() {
      let min = parseInt(document.getElementById("min").value);
      let max = parseInt(document.getElementById("max").value);
      let count = parseInt(document.getElementById("count").value);

if (isNaN(count) || count <= 0) {
  count = 1;
}
      let noRepeat = document.getElementById("noRepeatNumber").checked;

      let resultBox = document.getElementById("result");
      let statusBox = document.getElementById("status");

      resultBox.innerHTML = "";

     if (isNaN(min) || isNaN(max)) {
  alert("กรุณากรอกเลขต่ำสุดและเลขสูงสุด");
  return;
}

      if (min > max) {
        alert("เลขต่ำสุดต้องน้อยกว่าเลขสูงสุด");
        return;
      }
      
      let totalNumbers = max - min + 1;
      let newRange = min + "-" + max;

      if (currentRange !== newRange) {
        usedNumbers = [];
        currentRange = newRange;
      }

      let randomResult = [];

      if (noRepeat) {
        let availableNumbers = [];

        for (let i = min; i <= max; i++) {
          if (!usedNumbers.includes(i)) {
            availableNumbers.push(i);
          }
        }

        if (availableNumbers.length === 0) {
          alert("เลขถูกสุ่มครบหมดแล้ว กรุณากดรีเซ็ตเพื่อเริ่มใหม่");
          statusBox.innerHTML = "เลขถูกสุ่มครบหมดแล้ว";
          return;
        }

        if (count > availableNumbers.length) {
          alert("เลขที่เหลือไม่พอ เหลือเพียง " + availableNumbers.length + " เลข");
          return;
        }

        for (let i = 0; i < count; i++) {
          let randomIndex = Math.floor(Math.random() * availableNumbers.length);
          let randomNumber = availableNumbers[randomIndex];

          randomResult.push(randomNumber);
          usedNumbers.push(randomNumber);
          availableNumbers.splice(randomIndex, 1);
        }

        let remaining = totalNumbers - usedNumbers.length;

        statusBox.innerHTML =
          "โหมด: ไม่ซ้ำ<br>" +
          "สุ่มไปแล้ว: " + usedNumbers.length + " เลข<br>" +
          "เหลือ: " + remaining + " เลข";
      } else {
        for (let i = 0; i < count; i++) {
          let randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
          randomResult.push(randomNumber);
        }

        statusBox.innerHTML =
          "โหมด: สุ่มแบบซ้ำกันได้<br>" +
          "เลขอาจออกซ้ำกันทั้งในรอบเดียวกันและรอบถัดไป";
      }

      showNumberResult(randomResult);
    }

    function randomNames() {
      let nameText = document.getElementById("nameInput").value;
      let count = parseInt(document.getElementById("nameCount").value);
      let noRepeat = document.getElementById("noRepeatName").checked;

      let resultBox = document.getElementById("result");
      let statusBox = document.getElementById("status");

      resultBox.innerHTML = "";

      let names = nameText
        .split("\n")
        .map(name => name.trim())
        .filter(name => name !== "");

      names = [...new Set(names)];

      if (names.length === 0) {
        alert("กรุณากรอกรายชื่อก่อนสุ่ม");
        return;
      }

      if (isNaN(count) || count <= 0) {
        count = 1;
      }

      let newNameList = names.join("|");

      if (currentNameList !== newNameList) {
        usedNames = [];
        currentNameList = newNameList;
      }

      let randomResult = [];

      if (noRepeat) {
        let availableNames = names.filter(name => !usedNames.includes(name));

        if (availableNames.length === 0) {
          alert("รายชื่อถูกสุ่มครบหมดแล้ว กรุณากดรีเซ็ตเพื่อเริ่มใหม่");
          statusBox.innerHTML = "รายชื่อถูกสุ่มครบหมดแล้ว";
          return;
        }

        if (count > availableNames.length) {
          alert("รายชื่อที่เหลือไม่พอ เหลือเพียง " + availableNames.length + " คน");
          return;
        }

        for (let i = 0; i < count; i++) {
          let randomIndex = Math.floor(Math.random() * availableNames.length);
          let randomName = availableNames[randomIndex];

          randomResult.push(randomName);
          usedNames.push(randomName);
          availableNames.splice(randomIndex, 1);
        }

        let remaining = names.length - usedNames.length;

        statusBox.innerHTML =
          "โหมด: ไม่ซ้ำ<br>" +
          "สุ่มไปแล้ว: " + usedNames.length + " คน<br>" +
          "เหลือ: " + remaining + " คน";
      } else {
        for (let i = 0; i < count; i++) {
          let randomIndex = Math.floor(Math.random() * names.length);
          randomResult.push(names[randomIndex]);
        }

        statusBox.innerHTML =
          "โหมด: สุ่มแบบซ้ำกันได้<br>" +
          "รายชื่ออาจออกซ้ำกันทั้งในรอบเดียวกันและรอบถัดไป";
      }

      showNameResult(randomResult);
    }

    function showNumberResult(numbers) {
      let resultBox = document.getElementById("result");

      numbers.forEach(function(number) {
        let card = document.createElement("div");
        card.className = "number-card";
        card.innerText = number;
        resultBox.appendChild(card);
      });
    }

    function showNameResult(names) {
      let resultBox = document.getElementById("result");

      let list = document.createElement("ol");
      list.className = "name-list";

      names.forEach(function(name) {
        let item = document.createElement("li");
        item.innerText = name;
        list.appendChild(item);
      });

      resultBox.appendChild(list);
    }

    function resetAll() {
      usedNumbers = [];
      currentRange = "";

      usedNames = [];
      currentNameList = "";

      document.getElementById("result").innerHTML = "";
      document.getElementById("status").innerHTML = "รีเซ็ตแล้ว สามารถเริ่มสุ่มใหม่ได้";
    }
  </script>

</body>
</html>
